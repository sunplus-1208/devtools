<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Models - AI Toolkit Hub</title>
    <meta name="description" content="Compare the latest large language models: GPT, Claude, Gemini, DeepSeek, Llama, Gemma and more.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-brain text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">AI Toolkit Hub</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('zh')">中文</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900" data-i18n="title">LLM Models</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">Compare the latest large language models</p>
        </div>

        <!-- Filters -->
        <div class="mb-6 flex flex-wrap gap-2" id="filters">
            <button onclick="filterModels('all')" class="filter-btn px-4 py-2 rounded-full bg-primary text-white text-sm font-medium" data-filter="all" data-i18n="filter.all">All</button>
            <button onclick="filterModels('frontier')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="frontier" data-i18n="filter.frontier">Frontier</button>
            <button onclick="filterModels('open')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="open" data-i18n="filter.open">Open Source</button>
            <button onclick="filterModels('vision')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="vision" data-i18n="filter.vision">Vision</button>
            <button onclick="filterModels('fast')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="fast" data-i18n="filter.fast">Fast / Cheap</button>
        </div>

        <!-- Models Table -->
        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-gray-600 font-medium" data-i18n="th.model">Model</th>
                            <th class="px-4 py-3 text-left text-gray-600 font-medium" data-i18n="th.provider">Provider</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell" data-i18n="th.context">Context</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell" data-i18n="th.input">Input / 1M tokens</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell" data-i18n="th.output">Output / 1M tokens</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden lg:table-cell" data-i18n="th.type">Type</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium" data-i18n="th.link">Link</th>
                        </tr>
                    </thead>
                    <tbody id="modelsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Model Details -->
        <div class="mt-8 grid grid-cols-1 lg:grid-cols-2 gap-6" id="modelDetails"></div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-gray-500 text-sm">
            <p>&copy; 2026 AI Toolkit Hub · <span data-i18n="footer">Prices are approximate and subject to change</span></p>
        </div>
    </footer>

    <script>
        const i18n = {
            zh: {
                'title': '大语言模型对比',
                'subtitle': '主流大模型参数、性能与价格对比',
                'filter.all': '全部',
                'filter.frontier': '前沿模型',
                'filter.open': '开源',
                'filter.vision': '多模态',
                'filter.fast': '快速/低价',
                'th.model': '模型',
                'th.provider': '厂商',
                'th.context': '上下文',
                'th.input': '输入 / 1M tokens',
                'th.output': '输出 / 1M tokens',
                'th.type': '类型',
                'th.link': '链接',
                'footer': '价格仅供参考，以官方最新为准',
                'msg.frontier': '前沿',
                'msg.open': '开源',
                'msg.vision': '多模态'
            },
            en: {
                'title': 'LLM Models',
                'subtitle': 'Compare the latest large language models',
                'filter.all': 'All',
                'filter.frontier': 'Frontier',
                'filter.open': 'Open Source',
                'filter.vision': 'Vision',
                'filter.fast': 'Fast / Cheap',
                'th.model': 'Model',
                'th.provider': 'Provider',
                'th.context': 'Context',
                'th.input': 'Input / 1M tokens',
                'th.output': 'Output / 1M tokens',
                'th.type': 'Type',
                'th.link': 'Link',
                'footer': 'Prices are approximate and subject to change',
                'msg.frontier': 'Frontier',
                'msg.open': 'Open',
                'msg.vision': 'Vision'
            }
        };

        const models = [
            { name: 'GPT-4o', provider: 'OpenAI', context: '128K', input: '$2.50', output: '$10.00', tags: ['frontier', 'vision'], link: 'https://platform.openai.com', desc: 'Multimodal, cost-effective GPT-4 class model' },
            { name: 'GPT-4.5', provider: 'OpenAI', context: '128K', input: '$75.00', output: '$150.00', tags: ['frontier'], link: 'https://platform.openai.com', desc: 'Latest GPT-4 with extended thinking' },
            { name: 'Claude 4 Opus', provider: 'Anthropic', context: '200K', input: '$15.00', output: '$75.00', tags: ['frontier'], link: 'https://console.anthropic.com', desc: 'Top performance on coding and reasoning' },
            { name: 'Claude 4 Sonnet', provider: 'Anthropic', context: '200K', input: '$3.00', output: '$15.00', tags: ['frontier', 'fast'], link: 'https://console.anthropic.com', desc: 'Best cost-performance ratio in Claude family' },
            { name: 'Gemini 2.5 Pro', provider: 'Google', context: '1M', input: '$1.25', output: '$5.00', tags: ['frontier', 'vision'], link: 'https://ai.google.dev', desc: '1M context, best for long documents' },
            { name: 'Gemini 2.0 Flash', provider: 'Google', context: '1M', input: '$0.10', output: '$0.40', tags: ['frontier', 'fast'], link: 'https://ai.google.dev', desc: 'Ultra cheap, excellent for high-volume tasks' },
            { name: 'DeepSeek V3', provider: 'DeepSeek AI', context: '64K', input: '$0.27', output: '$1.10', tags: ['frontier', 'open'], link: 'https://platform.deepseek.com', desc: 'MoE open-source model, GPT-4 class performance' },
            { name: 'DeepSeek R1', provider: 'DeepSeek AI', context: '64K', input: '$0.55', output: '$2.19', tags: ['frontier', 'open'], link: 'https://platform.deepseek.com', desc: 'Reasoning model, alternative to o1' },
            { name: 'Llama 4 Scout', provider: 'Meta', context: '10M', input: 'Free*', output: 'Free*', tags: ['frontier', 'open'], link: 'https://llama.meta.com', desc: '17B active params, 10M context, open weights' },
            { name: 'Llama 4 Maverick', provider: 'Meta', context: '1M', input: 'Free*', output: 'Free*', tags: ['frontier', 'open'], link: 'https://llama.meta.com', desc: '17B active params, cost-effective' },
            { name: 'Gemma 3 27B', provider: 'Google', context: '128K', input: 'Free*', output: 'Free*', tags: ['open'], link: 'https://ai.google.dev/gemma', desc: 'Best open Gemma, runs on consumer GPU' },
            { name: 'Qwen 2.5 72B', provider: 'Alibaba', context: '128K', input: '$0.90', output: '$0.90', tags: ['open'], link: 'https://qwenlm.github.io', desc: 'Strong Chinese, multilingual support' },
            { name: 'Mistral Large 3', provider: 'Mistral AI', context: '128K', input: '$2.00', output: '$6.00', tags: ['frontier'], link: 'https://console.mistral.ai', desc: 'European AI, excellent at European languages' },
            { name: 'o4-mini', provider: 'OpenAI', context: '128K', input: '$1.10', output: '$4.40', tags: ['fast'], link: 'https://platform.openai.com', desc: 'Cheap reasoning model, great for code' },
        ];

        let currentLang = 'en';
        let currentFilter = 'all';

        function filterModels(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = btn.dataset.filter === filter
                    ? 'filter-btn px-4 py-2 rounded-full bg-primary text-white text-sm font-medium'
                    : 'filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm';
            });
            renderModels();
        }

        function renderModels() {
            const filtered = currentFilter === 'all' ? models : models.filter(m => m.tags.includes(currentFilter));
            const tbody = document.getElementById('modelsTable');
            tbody.innerHTML = filtered.map(m => `
                <tr class="border-t border-gray-100 hover:bg-gray-50 transition">
                    <td class="px-4 py-3 font-medium text-gray-900">${m.name}</td>
                    <td class="px-4 py-3 text-gray-600">${m.provider}</td>
                    <td class="px-4 py-3 text-center text-gray-500 hidden md:table-cell">${m.context}</td>
                    <td class="px-4 py-3 text-center font-mono text-green-600 hidden md:table-cell">${m.input}</td>
                    <td class="px-4 py-3 text-center font-mono text-orange-600 hidden md:table-cell">${m.output}</td>
                    <td class="px-4 py-3 text-center hidden lg:table-cell">
                        ${m.tags.map(t => `<span class="inline-block px-2 py-0.5 text-xs rounded-full mr-1 ${t === 'frontier' ? 'bg-purple-100 text-purple-700' : t === 'open' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${t}</span>`).join('')}
                    </td>
                    <td class="px-4 py-3 text-center">
                        <a href="${m.link}" target="_blank" class="text-primary hover:text-indigo-700"><i class="fas fa-external-link-alt"></i></a>
                    </td>
                </tr>
            `).join('');
        }

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' 
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en'
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            localStorage.setItem('ai-toolkit-lang', lang);
        }

        const savedLang = localStorage.getItem('ai-toolkit-lang');
        if (savedLang) switchLang(savedLang);
        else switchLang('en');
        renderModels();
    </script>
</body>
</html>
