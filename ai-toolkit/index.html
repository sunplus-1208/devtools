<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Toolkit Hub - Developer AI Tools Directory</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        accent: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style>
        .card-hover { transition: all 0.25s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <a href="../index.html" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-arrow-left"></i></a>
                    <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-brain text-white text-sm"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-tight">AI Toolkit Hub</h1>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input id="searchInput" type="text" class="pl-9 pr-4 py-1.5 rounded-lg bg-slate-100 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 w-48" placeholder="Search tools..." oninput="filterTools()">
                    </div>
                    <a href="https://github.com/sunplus-1208/devtools" target="_blank" class="text-slate-400 hover:text-slate-600"><i class="fab fa-github text-lg"></i></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-gradient-to-br from-indigo-600 via-purple-600 to-fuchsia-600 text-white py-16 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10" style="background-image: url('data:image/svg+xml,%3Csvg width=&quot;60&quot; height=&quot;60&quot; viewBox=&quot;0 0 60 60&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;%3E%3Cg fill=&quot;none&quot; fill-rule=&quot;evenodd&quot;%3E%3Cg fill=&quot;%23ffffff&quot; fill-opacity=&quot;0.4&quot;%3E%3Cpath d=&quot;M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z&quot;/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative">
            <h2 class="text-4xl font-bold mb-3">AI Toolkit Hub</h2>
            <p class="text-lg text-indigo-100 max-w-2xl mx-auto">Curated directory of AI developer tools, frameworks, APIs, and resources</p>
            <div class="flex justify-center gap-6 mt-6 text-sm text-indigo-200">
                <span><strong class="text-white" id="toolCount">0</strong> Tools</span>
                <span><strong class="text-white" id="catCount">0</strong> Categories</span>
                <span>Free & Open Source</span>
            </div>
        </div>
    </section>

    <!-- Category Filter -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-wrap gap-2" id="categoryFilters">
            <button onclick="filterCategory('all')" class="cat-btn px-4 py-1.5 rounded-full text-sm font-medium bg-indigo-600 text-white" data-cat="all">All</button>
        </div>
    </section>

    <!-- Tools Grid -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        <div id="noResults" class="hidden text-center py-16 text-slate-400">
            <i class="fas fa-search text-4xl mb-3"></i>
            <p>No tools found</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-slate-500 text-sm">
            <p>&copy; 2026 AI Toolkit Hub · Part of <a href="../index.html" class="text-indigo-600 hover:underline">DevTools</a></p>
        </div>
    </footer>

    <script>
    // ====== DATA ======
    const tools = [
        // --- LLM Providers ---
        { name: 'OpenAI', desc: 'GPT-4o, GPT-4, DALL·E, Whisper — the leading LLM API provider.', url: 'https://openai.com', cat: 'LLM Providers', tags: ['API', 'GPT', 'Chat'], icon: 'fa-robot', color: 'emerald' },
        { name: 'Anthropic', desc: 'Claude models with 200K context — strong at reasoning and safety.', url: 'https://anthropic.com', cat: 'LLM Providers', tags: ['API', 'Claude'], icon: 'fa-shield-halved', color: 'orange' },
        { name: 'Google AI', desc: 'Gemini models — multimodal, with Vertex AI and AI Studio.', url: 'https://ai.google', cat: 'LLM Providers', tags: ['API', 'Gemini', 'Multimodal'], icon: 'fa-google', iconPrefix: 'fab', color: 'blue' },
        { name: 'Mistral AI', desc: 'Open-weight models (Mistral, Mixtral) — strong European LLM provider.', url: 'https://mistral.ai', cat: 'LLM Providers', tags: ['API', 'Open Weight', 'EU'], icon: 'fa-wind', color: 'sky' },
        { name: 'Cohere', desc: 'Enterprise-focused LLMs — RAG, search, and embeddings.', url: 'https://cohere.com', cat: 'LLM Providers', tags: ['API', 'RAG', 'Enterprise'], icon: 'fa-database', color: 'violet' },
        { name: 'Together AI', desc: 'Serverless inference for 100+ open-source models at low cost.', url: 'https://together.ai', cat: 'LLM Providers', tags: ['Inference', 'Open Source'], icon: 'fa-people-group', color: 'teal' },
        { name: 'Groq', desc: 'LPU inference engine — ultra-fast LLM serving (Llama, Mixtral).', url: 'https://groq.com', cat: 'LLM Providers', tags: ['Fast Inference', 'LPU'], icon: 'fa-bolt', color: 'amber' },
        { name: 'Fireworks AI', desc: 'Fast, cheap inference for open-source LLMs and image models.', url: 'https://fireworks.ai', cat: 'LLM Providers', tags: ['Inference', 'Fast'], icon: 'fa-fire', color: 'red' },

        // --- Open Source Models ---
        { name: 'Hugging Face', desc: 'The GitHub of ML — 500K+ models, datasets, and Spaces.', url: 'https://huggingface.co', cat: 'Open Source Models', tags: ['Hub', 'Datasets', 'Spaces'], icon: 'fa-face-smile', color: 'yellow' },
        { name: 'Ollama', desc: 'Run LLMs locally — Llama 3, Mistral, Phi, Gemma, and more.', url: 'https://ollama.com', cat: 'Open Source Models', tags: ['Local', 'CLI', 'Privacy'], icon: 'fa-desktop', color: 'slate' },
        { name: 'LM Studio', desc: 'Desktop app to run any GGUF model locally with chat UI.', url: 'https://lmstudio.ai', cat: 'Open Source Models', tags: ['Local', 'GUI'], icon: 'fa-window-maximize', color: 'indigo' },
        { name: 'Llama (Meta)', desc: 'Meta\'s open-weight LLM family — Llama 3, Llama 3.1, and beyond.', url: 'https://llama.meta.com', cat: 'Open Source Models', tags: ['Open Weight', 'Meta'], icon: 'fa-meta', iconPrefix: 'fab', color: 'blue' },
        { name: 'vLLM', desc: 'High-throughput serving engine for LLMs with PagedAttention.', url: 'https://github.com/vllm-project/vllm', cat: 'Open Source Models', tags: ['Serving', 'Fast', 'GPU'], icon: 'fa-server', color: 'green' },

        // --- Agent Frameworks ---
        { name: 'LangChain', desc: 'Build LLM apps with chains, agents, and RAG pipelines.', url: 'https://langchain.com', cat: 'Agent Frameworks', tags: ['Framework', 'RAG', 'Agents'], icon: 'fa-link', color: 'emerald' },
        { name: 'LlamaIndex', desc: 'Data framework for LLM apps — connect custom data to LLMs.', url: 'https://llamaindex.ai', cat: 'Agent Frameworks', tags: ['RAG', 'Data', 'Framework'], icon: 'fa-book', color: 'purple' },
        { name: 'CrewAI', desc: 'Multi-agent orchestration — build AI teams that collaborate.', url: 'https://crewai.com', cat: 'Agent Frameworks', tags: ['Multi-Agent', 'Orchestration'], icon: 'fa-users', color: 'orange' },
        { name: 'AutoGen (Microsoft)', desc: 'Multi-agent conversation framework from Microsoft Research.', url: 'https://microsoft.github.io/autogen', cat: 'Agent Frameworks', tags: ['Multi-Agent', 'Microsoft'], icon: 'fa-comments', color: 'blue' },
        { name: 'Semantic Kernel', desc: 'Microsoft\'s SDK to integrate LLMs with C#, Python, Java apps.', url: 'https://learn.microsoft.com/en-us/semantic-kernel', cat: 'Agent Frameworks', tags: ['SDK', 'Microsoft', 'C#'], icon: 'fa-cube', color: 'purple' },
        { name: 'Phidata', desc: 'Build AI assistants with memory, tools, and RAG in Python.', url: 'https://phidata.com', cat: 'Agent Frameworks', tags: ['Python', 'Assistants', 'Memory'], icon: 'fa-wand-magic-sparkles', color: 'pink' },
        { name: 'OpenAI Agents SDK', desc: 'Official OpenAI SDK for building agents with handoffs and guardrails.', url: 'https://github.com/openai/openai-agents-python', cat: 'Agent Frameworks', tags: ['Official', 'OpenAI', 'Python'], icon: 'fa-puzzle-piece', color: 'emerald' },

        // --- Prompt Engineering ---
        { name: 'PromptPerfect', desc: 'Optimize and refine prompts for better LLM outputs.', url: 'https://promptperfect.jina.ai', cat: 'Prompt Engineering', tags: ['Optimization', 'Prompt'], icon: 'fa-wand-sparkles', color: 'fuchsia' },
        { name: 'DSPy', desc: 'Programmatic prompt optimization — compile declarative LM calls.', url: 'https://dspy.ai', cat: 'Prompt Engineering', tags: ['Framework', 'Optimization'], icon: 'fa-code', color: 'indigo' },
        { name: 'Promptfoo', desc: 'Test and evaluate LLM prompts locally — CI/CD for prompts.', url: 'https://promptfoo.dev', cat: 'Prompt Engineering', tags: ['Testing', 'Evaluation', 'CLI'], icon: 'fa-flask', color: 'amber' },
        { name: 'LangSmith', desc: 'Trace, evaluate, and debug LLM applications end-to-end.', url: 'https://smith.langchain.com', cat: 'Prompt Engineering', tags: ['Observability', 'Debug'], icon: 'fa-microscope', color: 'teal' },
        { name: 'OpenRouter', desc: 'Unified API for 200+ LLMs — compare and switch models easily.', url: 'https://openrouter.ai', cat: 'Prompt Engineering', tags: ['API Gateway', 'Comparison'], icon: 'fa-route', color: 'sky' },

        // --- Vector Databases ---
        { name: 'Pinecone', desc: 'Managed vector database — purpose-built for ML applications.', url: 'https://pinecone.io', cat: 'Vector Databases', tags: ['Managed', 'Serverless'], icon: 'fa-tree', color: 'green' },
        { name: 'Chroma', desc: 'Open-source embedding database — simple, fast, and local-first.', url: 'https://trychroma.com', cat: 'Vector Databases', tags: ['Open Source', 'Local'], icon: 'fa-circle-half-stroke', color: 'purple' },
        { name: 'Weaviate', desc: 'AI-native vector database with hybrid search and modules.', url: 'https://weaviate.io', cat: 'Vector Databases', tags: ['Hybrid Search', 'Modules'], icon: 'fa-magnifying-glass', color: 'yellow' },
        { name: 'Qdrant', desc: 'High-performance vector similarity search engine in Rust.', url: 'https://qdrant.tech', cat: 'Vector Databases', tags: ['Rust', 'Fast', 'Filter'], icon: 'fa-gauge-high', color: 'red' },
        { name: 'Milvus', desc: 'Open-source vector DB for scalable similarity search at billion scale.', url: 'https://milvus.io', cat: 'Vector Databases', tags: ['Scale', 'Open Source'], icon: 'fa-expand', color: 'blue' },

        // --- Image & Multimodal ---
        { name: 'Midjourney', desc: 'AI image generation — stunning artistic quality via Discord.', url: 'https://midjourney.com', cat: 'Image & Multimodal', tags: ['Image', 'Art'], icon: 'fa-image', color: 'blue' },
        { name: 'Stability AI', desc: 'Stable Diffusion and open-source image/video generation models.', url: 'https://stability.ai', cat: 'Image & Multimodal', tags: ['Open Source', 'Image', 'Video'], icon: 'fa-mountain-sun', color: 'purple' },
        { name: 'Runway', desc: 'AI video generation and editing — Gen-3 Alpha text-to-video.', url: 'https://runwayml.com', cat: 'Image & Multimodal', tags: ['Video', 'Creative'], icon: 'fa-film', color: 'slate' },
        { name: 'ElevenLabs', desc: 'Best-in-class AI voice synthesis and cloning.', url: 'https://elevenlabs.io', cat: 'Image & Multimodal', tags: ['Voice', 'TTS', 'Clone'], icon: 'fa-microphone', color: 'orange' },
        { name: 'Replicate', desc: 'Run any ML model via API — 25K+ models, pay per second.', url: 'https://replicate.com', cat: 'Image & Multimodal', tags: ['Inference', 'API', 'Models'], icon: 'fa-rotate', color: 'black' },
        { name: 'Comfy UI', desc: 'Node-based UI for Stable Diffusion — powerful and extensible.', url: 'https://comfyui.com', cat: 'Image & Multimodal', tags: ['UI', 'Stable Diffusion', 'Nodes'], icon: 'fa-sitemap', color: 'green' },

        // --- Fine-tuning & Training ---
        { name: 'Unsloth', desc: '2x faster LLM fine-tuning with 80% less memory — Llama, Mistral.', url: 'https://unsloth.ai', cat: 'Fine-tuning & Training', tags: ['Fine-tune', 'Fast', 'Memory'], icon: 'fa-gauge', color: 'emerald' },
        { name: 'Axolotl', desc: 'Configure and run LLM fine-tuning with YAML configs.', url: 'https://github.com/OpenAccess-AI-Collective/axolotl', cat: 'Fine-tuning & Training', tags: ['Fine-tune', 'YAML', 'LoRA'], icon: 'fa-sliders', color: 'pink' },
        { name: 'PEFT (HuggingFace)', desc: 'Parameter-efficient fine-tuning — LoRA, QLoRA, adapters.', url: 'https://github.com/huggingface/peft', cat: 'Fine-tuning & Training', tags: ['LoRA', 'QLoRA', 'Efficient'], icon: 'fa-minimize', color: 'yellow' },
        { name: 'Weights & Biases', desc: 'MLOps platform — track experiments, models, and datasets.', url: 'https://wandb.ai', cat: 'Fine-tuning & Training', tags: ['MLOps', 'Tracking', 'Experiments'], icon: 'fa-chart-line', color: 'violet' },

        // --- API Pricing Comparison ---
        { name: 'Artificial Analysis', desc: 'Compare LLM API pricing, speed, and quality across providers.', url: 'https://artificialanalysis.ai', cat: 'API Pricing & Comparison', tags: ['Pricing', 'Benchmark', 'Comparison'], icon: 'fa-chart-bar', color: 'sky' },
        { name: 'OpenRouter Pricing', desc: 'Real-time pricing for 200+ LLMs — sort by cost, speed, quality.', url: 'https://openrouter.ai/models', cat: 'API Pricing & Comparison', tags: ['Pricing', 'Models', 'Real-time'], icon: 'fa-tags', color: 'green' },
        { name: 'Vellum', desc: 'LLM orchestration platform — compare, test, and deploy prompts.', url: 'https://vellum.ai', cat: 'API Pricing & Comparison', tags: ['Orchestration', 'Testing'], icon: 'fa-scale-balanced', color: 'indigo' },
    ];

    // ====== RENDER ======
    const categories = [...new Set(tools.map(t => t.cat))];
    const colorMap = {
        emerald: { bg: 'bg-emerald-100', text: 'text-emerald-700', tag: 'bg-emerald-50 text-emerald-600' },
        orange: { bg: 'bg-orange-100', text: 'text-orange-700', tag: 'bg-orange-50 text-orange-600' },
        blue: { bg: 'bg-blue-100', text: 'text-blue-700', tag: 'bg-blue-50 text-blue-600' },
        sky: { bg: 'bg-sky-100', text: 'text-sky-700', tag: 'bg-sky-50 text-sky-600' },
        violet: { bg: 'bg-violet-100', text: 'text-violet-700', tag: 'bg-violet-50 text-violet-600' },
        teal: { bg: 'bg-teal-100', text: 'text-teal-700', tag: 'bg-teal-50 text-teal-600' },
        amber: { bg: 'bg-amber-100', text: 'text-amber-700', tag: 'bg-amber-50 text-amber-600' },
        red: { bg: 'bg-red-100', text: 'text-red-700', tag: 'bg-red-50 text-red-600' },
        yellow: { bg: 'bg-yellow-100', text: 'text-yellow-700', tag: 'bg-yellow-50 text-yellow-600' },
        slate: { bg: 'bg-slate-100', text: 'text-slate-700', tag: 'bg-slate-50 text-slate-600' },
        indigo: { bg: 'bg-indigo-100', text: 'text-indigo-700', tag: 'bg-indigo-50 text-indigo-600' },
        green: { bg: 'bg-green-100', text: 'text-green-700', tag: 'bg-green-50 text-green-600' },
        purple: { bg: 'bg-purple-100', text: 'text-purple-700', tag: 'bg-purple-50 text-purple-600' },
        pink: { bg: 'bg-pink-100', text: 'text-pink-700', tag: 'bg-pink-50 text-pink-600' },
        fuchsia: { bg: 'bg-fuchsia-100', text: 'text-fuchsia-700', tag: 'bg-fuchsia-50 text-fuchsia-600' },
        black: { bg: 'bg-gray-100', text: 'text-gray-700', tag: 'bg-gray-50 text-gray-600' },
    };

    let activeCategory = 'all';

    function renderTools() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid = document.getElementById('toolsGrid');
        
        const filtered = tools.filter(t => {
            const catMatch = activeCategory === 'all' || t.cat === activeCategory;
            const searchMatch = !query || 
                t.name.toLowerCase().includes(query) || 
                t.desc.toLowerCase().includes(query) || 
                t.tags.some(tag => tag.toLowerCase().includes(query)) ||
                t.cat.toLowerCase().includes(query);
            return catMatch && searchMatch;
        });

        grid.innerHTML = filtered.map(t => {
            const c = colorMap[t.color] || colorMap.blue;
            return `<a href="${t.url}" target="_blank" rel="noopener" class="card-hover bg-white rounded-xl p-5 shadow-sm border border-slate-100 block fade-in">
                <div class="flex items-start gap-4">
                    <div class="w-11 h-11 ${c.bg} rounded-lg flex items-center justify-center shrink-0">
                        <i class="${t.iconPrefix || 'fas'} ${t.icon || 'fa-cube'} ${c.text} text-lg"></i>
                    </div>
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <h4 class="font-semibold text-slate-900">${t.name}</h4>
                            <i class="fas fa-arrow-up-right-from-square text-slate-300 text-xs"></i>
                        </div>
                        <p class="text-sm text-slate-500 mb-2 line-clamp-2">${t.desc}</p>
                        <div class="flex flex-wrap gap-1.5">
                            ${t.tags.map(tag => `<span class="tag ${c.tag}">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            </a>`;
        }).join('');

        document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);
    }

    function renderCategoryFilters() {
        const container = document.getElementById('categoryFilters');
        const icons = {
            'LLM Providers': 'fa-cloud',
            'Open Source Models': 'fa-code-branch',
            'Agent Frameworks': 'fa-robot',
            'Prompt Engineering': 'fa-wand-sparkles',
            'Vector Databases': 'fa-database',
            'Image & Multimodal': 'fa-images',
            'Fine-tuning & Training': 'fa-sliders',
            'API Pricing & Comparison': 'fa-chart-bar',
        };
        
        let html = `<button onclick="filterCategory('all')" class="cat-btn px-4 py-1.5 rounded-full text-sm font-medium ${activeCategory === 'all' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}" data-cat="all">All</button>`;
        
        categories.forEach(cat => {
            const count = tools.filter(t => t.cat === cat).length;
            const isActive = activeCategory === cat;
            html += `<button onclick="filterCategory('${cat}')" class="cat-btn px-4 py-1.5 rounded-full text-sm font-medium ${isActive ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}" data-cat="${cat}">
                <i class="fas ${icons[cat] || 'fa-folder'} mr-1.5 text-xs"></i>${cat} <span class="ml-1 opacity-60">${count}</span>
            </button>`;
        });
        
        container.innerHTML = html;
    }

    function filterCategory(cat) {
        activeCategory = cat;
        renderCategoryFilters();
        renderTools();
    }

    function filterTools() {
        renderTools();
    }

    // Init
    document.getElementById('toolCount').textContent = tools.length;
    document.getElementById('catCount').textContent = categories.length;
    renderCategoryFilters();
    renderTools();
    </script>
</body>
</html>
