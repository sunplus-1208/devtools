<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VVLR9NKKXE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VVLR9NKKXE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Tools - AI Toolkit Hub</title>
    <meta name="description" content="Compare AI coding assistants: Cursor, GitHub Copilot, Claude Code, Trae, Windsurf and more. Features, pricing, and best use cases.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'}}}}</script>
    <style>.tool-card{transition:all .3s}.tool-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.1)}</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-brain text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">AI Toolkit Hub</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('zh')">дЄ≠жЦЗ</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900" data-i18n="title">AI Coding Tools</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">Compare the best AI coding assistants for developers</p>
        </div>

        <!-- Filters -->
        <div class="mb-6 flex flex-wrap gap-2">
            <button onclick="filterTools('all')" class="filter-btn px-4 py-2 rounded-full bg-primary text-white text-sm font-medium" data-filter="all">All</button>
            <button onclick="filterTools('ide')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="ide">IDE/Editor</button>
            <button onclick="filterTools('agent')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="agent">Agent</button>
            <button onclick="filterTools('extension')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="extension">Extension</button>
            <button onclick="filterTools('cli')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm" data-filter="cli">CLI</button>
        </div>

        <!-- Tools Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12" id="toolsGrid"></div>

        <!-- Comparison Table -->
        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100">
                <h3 class="text-lg font-bold text-gray-900" data-i18n="compare.title">Feature Comparison</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-gray-600 font-medium">Tool</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell">IDE Integration</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell">Codebase Aware</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell">Agent Mode</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden md:table-cell">Multi-file Edit</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium hidden lg:table-cell">Best For</th>
                            <th class="px-4 py-3 text-center text-gray-600 font-medium">Pricing</th>
                        </tr>
                    </thead>
                    <tbody id="compareTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-gray-500 text-sm">
            <p>&copy; 2026 AI Toolkit Hub ¬Ј <span data-i18n="footer">Tools updated 2026-05</span></p>
        </div>
    </footer>

    <script>
        const i18n = {
            zh: { title: 'AI зЉЦз®ЛеЈ•еЕЈ', subtitle: 'дЄїжµБ AI зЉЦз®ЛеК©жЙЛеѓєжѓФ', 'compare.title': 'еКЯиГљеѓєжѓФ', footer: 'жХ∞жНЃжЫіжЦ∞дЇ?2026-05' },
            en: { title: 'AI Coding Tools', subtitle: 'Compare the best AI coding assistants for developers', 'compare.title': 'Feature Comparison', footer: 'Tools updated 2026-05' }
        };

        const tools = [
            { name: 'Cursor', type: ['ide'], desc: 'AI-first code editor built on VS Code. Deep codebase understanding with @codebase. Agent mode for autonomous coding.', pricing: 'Free tier, $20/mo Pro', url: 'https://cursor.sh', icon: 'fa-code', color: 'bg-indigo-100 text-indigo-600', badge: 'Most Popular', badgeColor: 'bg-indigo-100 text-indigo-700', features: { ide: 'вЬУвЬУ', codebase: 'вЬУвЬУ', agent: 'вЬУвЬУ', multifile: 'вЬУвЬУ' }, bestFor: 'Full-stack dev' },
            { name: 'Claude Code', type: ['cli', 'agent'], desc: 'Anthropic\'s official CLI agent. Terminal-based, excellent reasoning. Works with any editor via MCP.', pricing: 'Pay-per-token (Claude pricing)', url: 'https://docs.anthropic.com/claude-code', icon: 'fa-terminal', color: 'bg-orange-100 text-orange-600', badge: 'Best Reasoning', badgeColor: 'bg-orange-100 text-orange-700', features: { ide: 'вЬ?, codebase: 'вЬ?, agent: 'вЬУвЬУ', multifile: 'вЬ? }, bestFor: 'Backend/Infra' },
            { name: 'GitHub Copilot', type: ['extension'], desc: 'Industry standard. Auto-complete, chat, and multi-file suggestions. Deep GitHub integration.', pricing: '$10/mo individual, $19/mo business', url: 'https://github.com/features/copilot', icon: 'fa-github', color: 'bg-gray-100 text-gray-600', badge: 'Industry Standard', badgeColor: 'bg-gray-100 text-gray-700', features: { ide: 'вЬУвЬУ', codebase: 'вЬ?, agent: 'вЬ?, multifile: 'вЬ? }, bestFor: 'General dev' },
            { name: 'Windsurf', type: ['ide', 'agent'], desc: 'AI IDE with Cascade agent flow. Good context handling and multi-file refactoring.', pricing: 'Free tier, $15/mo Pro', url: 'https://codeium.com/windsurf', icon: 'fa-wind', color: 'bg-cyan-100 text-cyan-600', badge: 'Fast Iteration', badgeColor: 'bg-cyan-100 text-cyan-700', features: { ide: 'вЬУвЬУ', codebase: 'вЬУвЬУ', agent: 'вЬУвЬУ', multifile: 'вЬУвЬУ' }, bestFor: 'Rapid prototyping' },
            { name: 'Trae', type: ['ide', 'agent'], desc: 'ByteDance\'s AI IDE. Builder mode for visual agent creation. Strong in Chinese language tasks.', pricing: 'Free (beta)', url: 'https://trae.ai', icon: 'fa-robot', color: 'bg-pink-100 text-pink-600', badge: 'New', badgeColor: 'bg-pink-100 text-pink-700', features: { ide: 'вЬУвЬУ', codebase: 'вЬ?, agent: 'вЬУвЬУ', multifile: 'вЬ? }, bestFor: 'Chinese dev' },
            { name: 'Replit Agent', type: ['agent'], desc: 'Browser-based agent. Deploy directly to cloud. No local setup required.', pricing: 'Free tier, $25/mo Core', url: 'https://replit.com/ai', icon: 'fa-cloud', color: 'bg-purple-100 text-purple-600', badge: 'Zero Setup', badgeColor: 'bg-purple-100 text-purple-700', features: { ide: 'вЬ?, codebase: 'вЬ?, agent: 'вЬУвЬУ', multifile: 'вЬ? }, bestFor: 'Quick deploy' },
            { name: 'Cline', type: ['extension', 'agent'], desc: 'VS Code extension with autonomous agent. Supports any LLM via OpenAI-compatible API.', pricing: 'Free (BYOK)', url: 'https://github.com/cline/cline', icon: 'fa-puzzle-piece', color: 'bg-green-100 text-green-600', badge: 'Open Source', badgeColor: 'bg-green-100 text-green-700', features: { ide: 'вЬ?, codebase: 'вЬ?, agent: 'вЬУвЬУ', multifile: 'вЬ? }, bestFor: 'BYOK users' },
            { name: 'Aider', type: ['cli', 'agent'], desc: 'Terminal-based pair programmer. Git-aware, works with your favorite editor.', pricing: 'Free (BYOK)', url: 'https://aider.chat', icon: 'fa-terminal', color: 'bg-teal-100 text-teal-600', badge: 'Git-aware', badgeColor: 'bg-teal-100 text-teal-700', features: { ide: 'вЬ?, codebase: 'вЬ?, agent: 'вЬ?, multifile: 'вЬ? }, bestFor: 'Terminal users' },
            { name: 'Zed', type: ['ide'], desc: 'High-performance editor with built-in AI assistant. Fast, lightweight.', pricing: 'Free tier, $10/mo Pro', url: 'https://zed.dev', icon: 'fa-bolt', color: 'bg-yellow-100 text-yellow-600', badge: 'Fastest', badgeColor: 'bg-yellow-100 text-yellow-700', features: { ide: 'вЬУвЬУ', codebase: 'вЬ?, agent: 'вЬ?, multifile: 'вЬ? }, bestFor: 'Speed-focused' },
        ];

        let currentLang = 'en', currentFilter = 'all';

        function filterTools(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.className = b.dataset.filter === f ? 'filter-btn px-4 py-2 rounded-full bg-primary text-white text-sm font-medium' : 'filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm');
            render();
        }

        function render() {
            const filtered = currentFilter === 'all' ? tools : tools.filter(t => t.type.includes(currentFilter));
            document.getElementById('toolsGrid').innerHTML = filtered.map(t => `
                <a href="${t.url}" target="_blank" class="tool-card bg-white rounded-xl p-6 shadow-md border border-gray-100 block">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 ${t.color} rounded-lg flex items-center justify-center">
                            <i class="fas ${t.icon} text-lg"></i>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-full ${t.badgeColor}">${t.badge}</span>
                    </div>
                    <h3 class="font-bold text-gray-900 mb-2">${t.name}</h3>
                    <p class="text-sm text-gray-600 mb-3">${t.desc}</p>
                    <div class="text-xs text-gray-500">${t.pricing}</div>
                </a>
            `).join('');

            document.getElementById('compareTable').innerHTML = tools.map(t => `
                <tr class="border-t border-gray-100 hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium text-gray-900">${t.name}</td>
                    <td class="px-4 py-3 text-center hidden md:table-cell">${t.features.ide}</td>
                    <td class="px-4 py-3 text-center hidden md:table-cell">${t.features.codebase}</td>
                    <td class="px-4 py-3 text-center hidden md:table-cell">${t.features.agent}</td>
                    <td class="px-4 py-3 text-center hidden md:table-cell">${t.features.multifile}</td>
                    <td class="px-4 py-3 text-center hidden lg:table-cell text-gray-500">${t.bestFor}</td>
                    <td class="px-4 py-3 text-center text-xs">${t.pricing}</td>
                </tr>
            `).join('');
        }

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (i18n[lang][k]) el.textContent = i18n[lang][k]; });
            localStorage.setItem('ai-toolkit-lang', lang);
        }

        const saved = localStorage.getItem('ai-toolkit-lang');
        if (saved) switchLang(saved); else switchLang('en');
        render();
    </script>
</body>
</html>
