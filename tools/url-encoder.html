<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('zh')">中文</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900" data-i18n="title">URL 编解码 / URL Encoder</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">URL 编码和解码工具</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700" data-i18n="input.title">输入 / Input</span>
                    <button onclick="clearInput()" class="text-xs px-3 py-1 bg-red-100 hover:bg-red-200 rounded text-red-700" data-i18n="btn.clear">清空</button>
                </div>
                <textarea id="input" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none" placeholder="https://example.com/path?query=你好&foo=bar"></textarea>
            </div>

            <!-- Output Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700" data-i18n="output.title">输出 / Output</span>
                    <button onclick="copyOutput()" class="text-xs px-3 py-1 bg-primary hover:bg-blue-600 text-white rounded" data-i18n="btn.copy">复制</button>
                </div>
                <textarea id="output" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none bg-gray-900 text-green-400" readonly></textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-6 flex flex-wrap gap-3">
            <button onclick="encodeURI()" class="px-6 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-right mr-2"></i><span data-i18n="btn.encode">编码 (encodeURI)</span>
            </button>
            <button onclick="decodeURI()" class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-left mr-2"></i><span data-i18n="btn.decode">解码 (decodeURI)</span>
            </button>
            <button onclick="encodeComponent()" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-right mr-2"></i><span data-i18n="btn.encodeComp">编码 (encodeURIComponent)</span>
            </button>
            <button onclick="decodeComponent()" class="px-6 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-left mr-2"></i><span data-i18n="btn.decodeComp">解码 (decodeURIComponent)</span>
            </button>
        </div>

        <!-- Info -->
        <div class="mt-6 bg-white rounded-xl shadow-md border border-gray-100 p-6">
            <h3 class="font-semibold text-gray-900 mb-4" data-i18n="info.title">编码区别</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                <div class="p-4 bg-blue-50 rounded-lg">
                    <div class="font-medium text-blue-800 mb-2">encodeURI</div>
                    <div class="text-gray-600">编码完整 URL，保留 <code class="bg-blue-100 px-1 rounded">:/?&=+$;,@</code> 等特殊字符</div>
                </div>
                <div class="p-4 bg-green-50 rounded-lg">
                    <div class="font-medium text-green-800 mb-2">encodeURIComponent</div>
                    <div class="text-gray-600">编码 URL 参数值，所有特殊字符都会被编码，适合作为查询参数值</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                'title': 'URL 编解码 / URL Encoder',
                'subtitle': 'URL 编码和解码工具',
                'input.title': '输入 / Input',
                'output.title': '输出 / Output',
                'btn.clear': '清空',
                'btn.copy': '复制',
                'btn.encode': '编码 (encodeURI)',
                'btn.decode': '解码 (decodeURI)',
                'btn.encodeComp': '编码 (encodeURIComponent)',
                'btn.decodeComp': '解码 (decodeURIComponent)',
                'info.title': '编码区别',
                'msg.copied': '已复制到剪贴板'
            },
            en: {
                'title': 'URL Encoder / URL 编解码',
                'subtitle': 'URL encoding and decoding tool',
                'input.title': 'Input / 输入',
                'output.title': 'Output / 输出',
                'btn.clear': 'Clear',
                'btn.copy': 'Copy',
                'btn.encode': 'Encode (encodeURI)',
                'btn.decode': 'Decode (decodeURI)',
                'btn.encodeComp': 'Encode (encodeURIComponent)',
                'btn.decodeComp': 'Decode (decodeURIComponent)',
                'info.title': 'Encoding Difference',
                'msg.copied': 'Copied to clipboard'
            }
        };

        let currentLang = 'zh';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            localStorage.setItem('devtools-lang', lang);
        }

        const savedLang = localStorage.getItem('devtools-lang');
        if (savedLang) switchLang(savedLang);

        function encodeURI_() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = window.encodeURI(input);
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function decodeURI_() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = window.decodeURI(input);
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function encodeComponent() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = encodeURIComponent(input);
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function decodeComponent() {
            const input = document.getElementById('input').value;
            try {
                document.getElementById('output').value = decodeURIComponent(input);
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function clearInput() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }

        function copyOutput() {
            const output = document.getElementById('output').value;
            navigator.clipboard.writeText(output).then(() => {
                alert(i18n[currentLang]['msg.copied']);
            });
        }
    </script>
</body>
</html>
