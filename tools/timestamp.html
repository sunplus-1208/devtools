<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Converter - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('zh')">õĖŁµ¢ć</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Timestamp Converter</h2>
            <p class="text-gray-600 mt-1">Convert between Unix timestamps and dates</p>
        </div>

        <!-- Current Time -->
        <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h3 class="text-sm font-medium text-gray-500 mb-1">Current Time</h3>
                    <div id="currentTime" class="text-3xl font-bold text-gray-900 font-mono"></div>
                    <div id="currentDate" class="text-lg text-gray-600 mt-1"></div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-gray-500 mb-1">Unix Timestamp</div>
                    <div id="currentTimestamp" class="text-2xl font-bold text-primary font-mono cursor-pointer" onclick="copyTimestamp()" title="Click to copy"></div>
                    <div id="currentMs" class="text-sm text-gray-400 font-mono"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Timestamp to Date -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100">
                    <span class="font-medium text-gray-700">Timestamp Ōå?Date</span>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Timestamp (seconds/milliseconds)</label>
                        <input id="tsInput" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg font-mono text-sm focus:outline-none focus:ring-2 focus:ring-primary" placeholder="e.g. 1745884800">
                    </div>
                    <button onclick="tsToDate()" class="w-full px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-medium transition">
                        <i class="fas fa-arrow-right mr-2"></i>Convert
                    </button>
                    <div id="tsResult" class="bg-gray-50 rounded-lg p-4 font-mono text-sm hidden">
                        <div id="tsResultLocal" class="mb-2"></div>
                        <div id="tsResultUTC" class="text-gray-500"></div>
                        <div id="tsResultRelative" class="text-primary mt-2"></div>
                    </div>
                </div>
            </div>

            <!-- Date to Timestamp -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100">
                    <span class="font-medium text-gray-700">Date Ōå?Timestamp</span>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date & Time</label>
                        <input id="dateInput" type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <button onclick="dateToTs()" class="w-full px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-medium transition">
                        <i class="fas fa-arrow-right mr-2"></i>Convert
                    </button>
                    <div id="dateResult" class="bg-gray-50 rounded-lg p-4 font-mono text-sm hidden">
                        <div id="dateResultSec" class="mb-2 cursor-pointer" onclick="copyValue(this.textContent)"></div>
                        <div id="dateResultMs" class="cursor-pointer" onclick="copyValue(this.textContent)"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Reference -->
        <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h3 class="font-medium text-gray-900 mb-4">Common Timestamps Reference</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm" id="refTable"></div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                'current.title': 'ÕĮōÕēŹµŚČķŚ┤',
                'current.unix': 'UnixµŚČķŚ┤µł?,
                'ts2date.title': 'µŚČķŚ┤µł│ŌåÆµŚźµ£¤',
                'ts2date.btn': 'ĶĮ¼µŹó',
                'date2ts.title': 'µŚźµ£¤ŌåÆµŚČķŚ┤µł│',
                'date2ts.btn': 'ĶĮ¼µŹó',
                'ref.title': 'ÕĖĖńö©µŚČķŚ┤µł│ÕÅéĶĆ?,
                'msg.copied': 'ÕĘ▓ÕżŹÕł?,
                'msg.local': 'µ£¼Õ£░µŚČķŚ┤',
                'msg.utc': 'UTC',
                'msg.seconds': 'ń¦?,
                'msg.milliseconds': 'µ»½ń¦Æ'
            },
            en: {
                'current.title': 'Current Time',
                'current.unix': 'Unix Timestamp',
                'ts2date.title': 'Timestamp to Date',
                'ts2date.btn': 'Convert',
                'date2ts.title': 'Date to Timestamp',
                'date2ts.btn': 'Convert',
                'ref.title': 'Common Timestamps Reference',
                'msg.copied': 'Copied',
                'msg.local': 'Local',
                'msg.utc': 'UTC',
                'msg.seconds': 'seconds',
                'msg.milliseconds': 'milliseconds'
            }
        };

        let currentLang = 'en';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' 
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en'
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            localStorage.setItem('devtools-lang', lang);
        }

        const savedLang = localStorage.getItem('devtools-lang') || 'en';
        if (savedLang === 'zh') switchLang('zh');

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('currentTimestamp').textContent = Math.floor(now.getTime() / 1000);
            document.getElementById('currentMs').textContent = now.getTime() + ' ms';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function tsToDate() {
            let ts = document.getElementById('tsInput').value.trim();
            if (!ts) return;
            ts = parseInt(ts);
            if (ts > 1e12) ts = Math.floor(ts);
            else ts = ts * 1000;
            
            const date = new Date(ts);
            if (isNaN(date.getTime())) return;
            
            document.getElementById('tsResultLocal').innerHTML = `<strong>Local:</strong> ${date.toLocaleString('en-US')}`;
            document.getElementById('tsResultUTC').innerHTML = `<strong>UTC:</strong> ${date.toUTCString()}`;
            
            const diff = Date.now() - date.getTime();
            const absDiff = Math.abs(diff);
            let relative;
            if (absDiff < 60000) relative = Math.floor(absDiff / 1000) + 's';
            else if (absDiff < 3600000) relative = Math.floor(absDiff / 60000) + 'min';
            else if (absDiff < 86400000) relative = Math.floor(absDiff / 3600000) + 'h';
            else relative = Math.floor(absDiff / 86400000) + 'd';
            relative = diff > 0 ? relative + ' ago' : 'in ' + relative;
            document.getElementById('tsResultRelative').textContent = relative;
            
            document.getElementById('tsResult').classList.remove('hidden');
        }

        function dateToTs() {
            const dateStr = document.getElementById('dateInput').value;
            if (!dateStr) return;
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return;
            
            document.getElementById('dateResultSec').innerHTML = `<strong>Seconds:</strong> ${Math.floor(date.getTime() / 1000)}`;
            document.getElementById('dateResultMs').innerHTML = `<strong>Milliseconds:</strong> ${date.getTime()}`;
            document.getElementById('dateResult').classList.remove('hidden');
        }

        function copyTimestamp() {
            navigator.clipboard.writeText(document.getElementById('currentTimestamp').textContent).then(() => {
                alert('Copied');
            });
        }

        function copyValue(text) {
            navigator.clipboard.writeText(text.replace(/^[^:]+:\s*/, '')).then(() => {
                alert('Copied');
            });
        }

        function buildRefTable() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const refs = [
                { label: 'Today 00:00', ts: Math.floor(today.getTime() / 1000) },
                { label: 'Now', ts: Math.floor(now.getTime() / 1000) },
                { label: 'Today 23:59', ts: Math.floor(new Date(today.getTime() + 86399000).getTime() / 1000) },
                { label: '1h ago', ts: Math.floor((now.getTime() - 3600000) / 1000) },
                { label: '24h ago', ts: Math.floor((now.getTime() - 86400000) / 1000) },
                { label: '7d ago', ts: Math.floor((now.getTime() - 604800000) / 1000) },
                { label: '30d ago', ts: Math.floor((now.getTime() - 2592000000) / 1000) },
                { label: '1h later', ts: Math.floor((now.getTime() + 3600000) / 1000) },
                { label: '24h later', ts: Math.floor((now.getTime() + 86400000) / 1000) },
            ];
            const container = document.getElementById('refTable');
            container.innerHTML = refs.map(r => `
                <div class="flex justify-between items-center bg-gray-50 rounded px-3 py-2 cursor-pointer hover:bg-gray-100" onclick="copyValue('${r.ts}')">
                    <span class="text-gray-600">${r.label}</span>
                    <span class="font-mono text-gray-900">${r.ts}</span>
                </div>
            `).join('');
        }
        buildRefTable();
    </script>
</body>
</html>
