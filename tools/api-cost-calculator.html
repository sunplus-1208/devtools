<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Cost Calculator - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('zh')">中文</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900" data-i18n="title">API Cost Calculator</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">Calculate costs for popular AI APIs</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Calculator -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Model Selection -->
                <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
                    <h3 class="font-medium text-gray-900 mb-4" data-i18n="selectModel">Select Model</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <button onclick="selectProvider('openai')" id="btn-openai" class="provider-btn px-4 py-3 border-2 border-primary bg-blue-50 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">OpenAI</div>
                            <div class="text-xs text-gray-500">GPT-4, GPT-3.5</div>
                        </button>
                        <button onclick="selectProvider('anthropic')" id="btn-anthropic" class="provider-btn px-4 py-3 border-2 border-gray-200 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">Anthropic</div>
                            <div class="text-xs text-gray-500">Claude</div>
                        </button>
                        <button onclick="selectProvider('google')" id="btn-google" class="provider-btn px-4 py-3 border-2 border-gray-200 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">Google</div>
                            <div class="text-xs text-gray-500">Gemini</div>
                        </button>
                        <button onclick="selectProvider('deepseek')" id="btn-deepseek" class="provider-btn px-4 py-3 border-2 border-gray-200 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">DeepSeek</div>
                            <div class="text-xs text-gray-500">V3, R1</div>
                        </button>
                        <button onclick="selectProvider('meta')" id="btn-meta" class="provider-btn px-4 py-3 border-2 border-gray-200 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">Meta</div>
                            <div class="text-xs text-gray-500">Llama</div>
                        </button>
                        <button onclick="selectProvider('mistral')" id="btn-mistral" class="provider-btn px-4 py-3 border-2 border-gray-200 rounded-lg text-left transition hover:shadow-md">
                            <div class="font-medium text-gray-900">Mistral</div>
                            <div class="text-xs text-gray-500">Mistral, Codestral</div>
                        </button>
                    </div>
                    
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="specificModel">Specific Model</label>
                        <select id="modelSelect" onchange="updatePricing()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="gpt-4.5-turbo">GPT-4.5 Turbo</option>
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                            <option value="gpt-4-turbo">GPT-4 Turbo</option>
                            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                        </select>
                    </div>
                </div>

                <!-- Token Input -->
                <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
                    <h3 class="font-medium text-gray-900 mb-4" data-i18n="tokenInput">Token Usage</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="inputTokens">Input Tokens</label>
                            <input type="number" id="inputTokens" value="1000" min="0" onchange="calculate()" oninput="calculate()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="outputTokens">Output Tokens</label>
                            <input type="number" id="outputTokens" value="500" min="0" onchange="calculate()" oninput="calculate()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="requests">Number of Requests</label>
                        <input type="number" id="requests" value="1" min="1" onchange="calculate()" oninput="calculate()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                </div>

                <!-- Result -->
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl shadow-lg p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-blue-100 text-sm" data-i18n="totalCost">Total Cost</div>
                            <div class="text-4xl font-bold mt-1" id="totalCost">$0.00</div>
                        </div>
                        <div class="text-right">
                            <div class="text-blue-100 text-sm" data-i18n="perRequest">Per Request</div>
                            <div class="text-2xl font-semibold mt-1" id="perRequestCost">$0.00</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-blue-400 grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="text-blue-200" data-i18n="inputCost">Input Cost:</span>
                            <span id="inputCost" class="font-medium">$0.00</span>
                        </div>
                        <div>
                            <span class="text-blue-200" data-i18n="outputCost">Output Cost:</span>
                            <span id="outputCost" class="font-medium">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pricing Table -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
                <h3 class="font-medium text-gray-900 mb-4" data-i18n="pricingTable">Pricing Reference</h3>
                <div id="pricingTable" class="space-y-3 text-sm">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Batch Calculator -->
        <div class="mt-6 bg-white rounded-xl shadow-md border border-gray-100 p-6">
            <h3 class="font-medium text-gray-900 mb-4" data-i18n="batchCalc">Batch Calculator</h3>
            <p class="text-gray-500 text-sm mb-4" data-i18n="batchDesc">Enter custom pricing (per 1M tokens)</p>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="customInput">Input Price ($/1M)</label>
                    <input type="number" id="customInputPrice" value="10" step="0.01" onchange="calculateCustom()" oninput="calculateCustom()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="customOutput">Output Price ($/1M)</label>
                    <input type="number" id="customOutputPrice" value="30" step="0.01" onchange="calculateCustom()" oninput="calculateCustom()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="tokens">Tokens</label>
                    <input type="number" id="customTokens" value="10000" min="0" onchange="calculateCustom()" oninput="calculateCustom()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="result">Result</label>
                    <div id="customResult" class="px-3 py-2 bg-green-50 border border-green-200 rounded-lg font-medium text-green-700">$0.40</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                title: 'API 成本计算器',
                subtitle: '计算主流 AI API 的使用成本',
                selectModel: '选择模型',
                specificModel: '具体模型',
                tokenInput: 'Token 用量',
                inputTokens: '输入 Tokens',
                outputTokens: '输出 Tokens',
                requests: '请求次数',
                totalCost: '总成本',
                perRequest: '单次请求',
                inputCost: '输入成本:',
                outputCost: '输出成本:',
                pricingTable: '价格参考',
                batchCalc: '自定义计算器',
                batchDesc: '输入自定义价格（每百万 tokens）',
                customInput: '输入价格 ($/1M)',
                customOutput: '输出价格 ($/1M)',
                tokens: 'Tokens',
                result: '结果'
            },
            en: {
                title: 'API Cost Calculator',
                subtitle: 'Calculate costs for popular AI APIs',
                selectModel: 'Select Model',
                specificModel: 'Specific Model',
                tokenInput: 'Token Usage',
                inputTokens: 'Input Tokens',
                outputTokens: 'Output Tokens',
                requests: 'Number of Requests',
                totalCost: 'Total Cost',
                perRequest: 'Per Request',
                inputCost: 'Input Cost:',
                outputCost: 'Output Cost:',
                pricingTable: 'Pricing Reference',
                batchCalc: 'Custom Calculator',
                batchDesc: 'Enter custom pricing (per 1M tokens)',
                customInput: 'Input Price ($/1M)',
                customOutput: 'Output Price ($/1M)',
                tokens: 'Tokens',
                result: 'Result'
            }
        };

        const pricing = {
            openai: [
                { id: 'gpt-4.5-turbo', name: 'GPT-4.5 Turbo', input: 10.00, output: 30.00 },
                { id: 'gpt-4o', name: 'GPT-4o', input: 2.50, output: 10.00 },
                { id: 'gpt-4o-mini', name: 'GPT-4o Mini', input: 0.15, output: 0.60 },
                { id: 'gpt-4-turbo', name: 'GPT-4 Turbo', input: 10.00, output: 30.00 },
                { id: 'gpt-3.5-turbo', name: 'GPT-3.5 Turbo', input: 0.50, output: 1.50 }
            ],
            anthropic: [
                { id: 'claude-opus-4', name: 'Claude Opus 4', input: 15.00, output: 75.00 },
                { id: 'claude-sonnet-4', name: 'Claude Sonnet 4', input: 3.00, output: 15.00 },
                { id: 'claude-3.5-sonnet', name: 'Claude 3.5 Sonnet', input: 3.00, output: 15.00 },
                { id: 'claude-3-opus', name: 'Claude 3 Opus', input: 15.00, output: 75.00 },
                { id: 'claude-3-haiku', name: 'Claude 3 Haiku', input: 0.25, output: 1.25 }
            ],
            google: [
                { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', input: 1.25, output: 10.00 },
                { id: 'gemini-2.0-flash', name: 'Gemini 2.0 Flash', input: 0.10, output: 0.40 },
                { id: 'gemini-1.5-pro', name: 'Gemini 1.5 Pro', input: 1.25, output: 5.00 },
                { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash', input: 0.075, output: 0.30 }
            ],
            deepseek: [
                { id: 'deepseek-v3', name: 'DeepSeek V3', input: 0.27, output: 1.10 },
                { id: 'deepseek-r1', name: 'DeepSeek R1', input: 0.55, output: 2.19 }
            ],
            meta: [
                { id: 'llama-4-maverick', name: 'Llama 4 Maverick', input: 0.20, output: 0.60 },
                { id: 'llama-4-scout', name: 'Llama 4 Scout', input: 0.10, output: 0.30 },
                { id: 'llama-3.3-70b', name: 'Llama 3.3 70B', input: 0.60, output: 0.60 }
            ],
            mistral: [
                { id: 'mistral-large', name: 'Mistral Large', input: 2.00, output: 6.00 },
                { id: 'mistral-medium', name: 'Mistral Medium', input: 0.40, output: 1.20 },
                { id: 'codestral', name: 'Codestral', input: 0.30, output: 0.90 }
            ]
        };

        let currentProvider = 'openai';
        let currentLang = 'en';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' 
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en'
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            localStorage.setItem('devtools-lang', lang);
        }

        function selectProvider(provider) {
            currentProvider = provider;
            document.querySelectorAll('.provider-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-blue-50');
                btn.classList.add('border-gray-200');
            });
            document.getElementById('btn-' + provider).classList.remove('border-gray-200');
            document.getElementById('btn-' + provider).classList.add('border-primary', 'bg-blue-50');
            updateModelSelect();
            updatePricingTable();
        }

        function updateModelSelect() {
            const select = document.getElementById('modelSelect');
            select.innerHTML = '';
            pricing[currentProvider].forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name;
                select.appendChild(option);
            });
            updatePricing();
        }

        function updatePricing() {
            calculate();
        }

        function calculate() {
            const modelId = document.getElementById('modelSelect').value;
            const model = pricing[currentProvider].find(m => m.id === modelId);
            if (!model) return;

            const inputTokens = parseInt(document.getElementById('inputTokens').value) || 0;
            const outputTokens = parseInt(document.getElementById('outputTokens').value) || 0;
            const requests = parseInt(document.getElementById('requests').value) || 1;

            const inputCost = (inputTokens * model.input / 1000000) * requests;
            const outputCost = (outputTokens * model.output / 1000000) * requests;
            const total = inputCost + outputCost;
            const perRequest = total / requests;

            document.getElementById('totalCost').textContent = '$' + total.toFixed(4);
            document.getElementById('perRequestCost').textContent = '$' + perRequest.toFixed(4);
            document.getElementById('inputCost').textContent = '$' + inputCost.toFixed(4);
            document.getElementById('outputCost').textContent = '$' + outputCost.toFixed(4);
        }

        function updatePricingTable() {
            const container = document.getElementById('pricingTable');
            container.innerHTML = '';
            
            pricing[currentProvider].forEach(model => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center py-2 border-b border-gray-100 last:border-0';
                div.innerHTML = `
                    <div>
                        <div class="font-medium text-gray-800">${model.name}</div>
                        <div class="text-xs text-gray-500">Input: $${model.input}/1M | Output: $${model.output}/1M</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function calculateCustom() {
            const inputPrice = parseFloat(document.getElementById('customInputPrice').value) || 0;
            const outputPrice = parseFloat(document.getElementById('customOutputPrice').value) || 0;
            const tokens = parseInt(document.getElementById('customTokens').value) || 0;

            const cost = (tokens * inputPrice / 1000000) + (tokens * outputPrice / 1000000);
            document.getElementById('customResult').textContent = '$' + cost.toFixed(4);
        }

        // Initialize
        const savedLang = localStorage.getItem('devtools-lang') || 'en';
        if (savedLang === 'zh') switchLang('zh');
        
        updateModelSelect();
        updatePricingTable();
        calculate();
        calculateCustom();
    </script>
</body>
</html>
