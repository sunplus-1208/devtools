<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('zh')">中文</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900" data-i18n="title">Base64 编解码 / Base64 Encoder</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">文本和文件的 Base64 转换</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700" data-i18n="input.title">输入 / Input</span>
                    <div class="space-x-2">
                        <button onclick="clearInput()" class="text-xs px-3 py-1 bg-red-100 hover:bg-red-200 rounded text-red-700" data-i18n="btn.clear">清空</button>
                    </div>
                </div>
                <textarea id="input" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none" placeholder="Enter text to encode..."></textarea>
                <div class="px-4 py-3 border-t border-gray-100">
                    <label class="flex items-center gap-2 text-sm text-gray-600">
                        <input type="checkbox" id="urlSafe" class="rounded">
                        <span data-i18n="urlsafe">URL Safe (替换 +/ 为 -_)</span>
                    </label>
                </div>
            </div>

            <!-- Output Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700" data-i18n="output.title">输出 / Output</span>
                    <button onclick="copyOutput()" class="text-xs px-3 py-1 bg-primary hover:bg-blue-600 text-white rounded" data-i18n="btn.copy">复制</button>
                </div>
                <textarea id="output" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none bg-gray-900 text-green-400" readonly></textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-6 flex flex-wrap gap-3">
            <button onclick="encode()" class="px-6 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-right mr-2"></i><span data-i18n="btn.encode">编码 (Text → Base64)</span>
            </button>
            <button onclick="decode()" class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-arrow-left mr-2"></i><span data-i18n="btn.decode">解码 (Base64 → Text)</span>
            </button>
        </div>

        <!-- File Upload -->
        <div class="mt-6 bg-white rounded-xl shadow-md border border-gray-100 p-6">
            <h3 class="font-semibold text-gray-900 mb-4" data-i18n="file.title">文件转 Base64</h3>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
                <input type="file" id="fileInput" class="hidden" onchange="handleFile()">
                <button onclick="document.getElementById('fileInput').click()" class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition">
                    <i class="fas fa-upload mr-2"></i><span data-i18n="file.select">选择文件</span>
                </button>
                <p class="mt-2 text-sm text-gray-500" data-i18n="file.hint">支持图片、文本等任意文件</p>
            </div>
            <div id="fileInfo" class="mt-4 hidden p-3 bg-gray-50 rounded-lg">
                <div class="flex justify-between items-center">
                    <span id="fileName" class="text-sm text-gray-700"></span>
                    <span id="fileSize" class="text-xs text-gray-500"></span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                'title': 'Base64 编解码 / Base64 Encoder',
                'subtitle': '文本和文件的 Base64 转换',
                'input.title': '输入 / Input',
                'output.title': '输出 / Output',
                'btn.clear': '清空',
                'btn.copy': '复制',
                'btn.encode': '编码 (Text → Base64)',
                'btn.decode': '解码 (Base64 → Text)',
                'urlsafe': 'URL Safe (替换 +/ 为 -_)',
                'file.title': '文件转 Base64',
                'file.select': '选择文件',
                'file.hint': '支持图片、文本等任意文件',
                'msg.copied': '已复制到剪贴板',
                'msg.empty': '请输入内容'
            },
            en: {
                'title': 'Base64 Encoder / Base64 编解码',
                'subtitle': 'Convert text and files to/from Base64',
                'input.title': 'Input / 输入',
                'output.title': 'Output / 输出',
                'btn.clear': 'Clear',
                'btn.copy': 'Copy',
                'btn.encode': 'Encode (Text → Base64)',
                'btn.decode': 'Decode (Base64 → Text)',
                'urlsafe': 'URL Safe (replace +/ with -_)',
                'file.title': 'File to Base64',
                'file.select': 'Select File',
                'file.hint': 'Supports images, text, and any file type',
                'msg.copied': 'Copied to clipboard',
                'msg.empty': 'Please enter content'
            }
        };

        let currentLang = 'zh';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            localStorage.setItem('devtools-lang', lang);
        }

        const savedLang = localStorage.getItem('devtools-lang');
        if (savedLang) switchLang(savedLang);

        function encode() {
            const input = document.getElementById('input').value;
            if (!input) { alert(i18n[currentLang]['msg.empty']); return; }
            
            let encoded = btoa(unescape(encodeURIComponent(input)));
            if (document.getElementById('urlSafe').checked) {
                encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            }
            document.getElementById('output').value = encoded;
        }

        function decode() {
            let input = document.getElementById('input').value.trim();
            if (!input) { alert(i18n[currentLang]['msg.empty']); return; }
            
            try {
                if (document.getElementById('urlSafe').checked) {
                    input = input.replace(/-/g, '+').replace(/_/g, '/');
                    while (input.length % 4) input += '=';
                }
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('output').value = decoded;
            } catch (e) {
                document.getElementById('output').value = 'Error: Invalid Base64 string';
            }
        }

        function handleFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result.split(',')[1];
                document.getElementById('output').value = base64;
                document.getElementById('input').value = `data:${file.type};base64,${base64}`;
                
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(2) + ' KB';
            };
            reader.readAsDataURL(file);
        }

        function clearInput() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
        }

        function copyOutput() {
            const output = document.getElementById('output').value;
            navigator.clipboard.writeText(output).then(() => {
                alert(i18n[currentLang]['msg.copied']);
            });
        }
    </script>
</body>
</html>
