<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('zh')">õĖŁµ¢ć</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Base64 Encoder</h2>
            <p class="text-gray-600 mt-1">Encode and decode text and files to Base64</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Input -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700">Input</span>
                    <button onclick="clearInput()" class="text-xs px-3 py-1 bg-red-100 hover:bg-red-200 rounded text-red-700">Clear</button>
                </div>
                <textarea id="input" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none" placeholder="Enter text or Base64 string..."></textarea>
            </div>

            <!-- Output -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                    <span class="font-medium text-gray-700">Output</span>
                    <button onclick="copyOutput()" class="text-xs px-3 py-1 bg-primary hover:bg-blue-600 text-white rounded">Copy</button>
                </div>
                <textarea id="output" class="w-full h-80 p-4 font-mono text-sm resize-none focus:outline-none bg-gray-50" readonly></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-6 flex flex-wrap gap-3">
            <button onclick="encodeBase64()" class="px-6 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-medium transition">
                <i class="fas fa-lock mr-2"></i>Encode
            </button>
            <button onclick="decodeBase64()" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-unlock mr-2"></i>Decode
            </button>
            <button onclick="encodeURL()" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition">
                <i class="fas fa-link mr-2"></i>URL Safe Encode
            </button>
        </div>

        <!-- File Upload -->
        <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h3 class="font-medium text-gray-900 mb-3">File to Base64</h3>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-primary transition">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                <p class="text-gray-500 mb-2">Drag file here, or click to select</p>
                <input type="file" id="fileInput" class="hidden" onchange="encodeFile(this)">
                <button onclick="document.getElementById('fileInput').click()" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg text-sm">Select File</button>
            </div>
            <div id="fileInfo" class="hidden mt-3 text-sm text-gray-600"></div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                'btn.clear': 'µĖģń®║',
                'btn.copy': 'ÕżŹÕłČ',
                'btn.encode': 'ń╝¢ńĀü',
                'btn.decode': 'Ķ¦ŻńĀü',
                'btn.url-encode': 'URLÕ«ēÕģ©ń╝¢ńĀü',
                'file.title': 'µ¢ćõ╗ČĶĮ¼Base64',
                'file.desc': 'µŗ¢µŗĮµ¢ćõ╗ČÕł░µŁżÕżä’╝īµł¢ńé╣Õć╗ķĆēµŗ®',
                'file.btn': 'ķĆēµŗ®µ¢ćõ╗Č',
                'msg.copied': 'ÕĘ▓ÕżŹÕłČÕł░Õē¬Ķ┤┤µØ?,
                'msg.decode-error': 'Ķ¦ŻńĀüÕż▒Ķ┤ź’╝ÜµŚĀµĢłńÜäBase64ÕŁŚń¼”õĖ?,
                'msg.file-size': 'µ¢ćõ╗ČÕż¦Õ░Å'
            },
            en: {
                'btn.clear': 'Clear',
                'btn.copy': 'Copy',
                'btn.encode': 'Encode',
                'btn.decode': 'Decode',
                'btn.url-encode': 'URL Safe Encode',
                'file.title': 'File to Base64',
                'file.desc': 'Drag file here, or click to select',
                'file.btn': 'Select File',
                'msg.copied': 'Copied to clipboard',
                'msg.decode-error': 'Decode failed: Invalid Base64 string',
                'msg.file-size': 'File size'
            }
        };

        let currentLang = 'en';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' 
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en'
                ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium'
                : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            localStorage.setItem('devtools-lang', lang);
        }

        const savedLang = localStorage.getItem('devtools-lang') || 'en';
        if (savedLang === 'zh') switchLang('zh');

        function encodeBase64() {
            const input = document.getElementById('input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('output').value = encoded;
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function decodeBase64() {
            const input = document.getElementById('input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('output').value = decoded;
            } catch (e) {
                document.getElementById('output').value = 'Decode failed: Invalid Base64 string';
            }
        }

        function encodeURL() {
            const input = document.getElementById('input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                document.getElementById('output').value = encoded;
            } catch (e) {
                document.getElementById('output').value = 'Error: ' + e.message;
            }
        }

        function encodeFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                document.getElementById('output').value = base64;
                const info = document.getElementById('fileInfo');
                info.classList.remove('hidden');
                const size = file.size < 1024 ? file.size + ' B' 
                    : file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB'
                    : (file.size / 1048576).toFixed(1) + ' MB';
                info.textContent = `${file.name} | Size: ${size}`;
            };
            reader.readAsDataURL(file);
        }

        function clearInput() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
        }

        function copyOutput() {
            navigator.clipboard.writeText(document.getElementById('output').value).then(() => {
                alert('Copied to clipboard');
            });
        }
    </script>
</body>
</html>
