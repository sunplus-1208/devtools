<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - DevTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        .copy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center">
                        <i class="fas fa-arrow-left text-gray-500 mr-3 hover:text-gray-700"></i>
                        <i class="fas fa-tools text-primary text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">DevTools</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-zh" class="px-3 py-1 rounded-md bg-primary text-white text-sm font-medium" onclick="switchLang('zh')">中文</button>
                    <button id="lang-en" class="px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium" onclick="switchLang('en')">EN</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-900" data-i18n="title">颜色选择器 / Color Picker</h2>
            <p class="text-gray-600 mt-1" data-i18n="subtitle">选择、转换、生成配色方案</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Color Picker Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
                <h3 class="font-semibold text-gray-900 mb-4" data-i18n="picker.title">颜色选择</h3>
                
                <div class="flex items-center gap-4 mb-6">
                    <input type="color" id="colorPicker" value="#3b82f6" class="w-24 h-24 rounded-lg cursor-pointer border-2 border-gray-200">
                    <div id="colorPreview" class="flex-1 h-24 rounded-lg border-2 border-gray-200" style="background-color: #3b82f6;"></div>
                </div>

                <!-- RGB Sliders -->
                <div class="space-y-4">
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1"><span>R</span><span id="rValue">59</span></label>
                        <input type="range" id="rSlider" min="0" max="255" value="59" class="w-full h-2 bg-red-100 rounded-lg appearance-none cursor-pointer accent-red-500">
                    </div>
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1"><span>G</span><span id="gValue">130</span></label>
                        <input type="range" id="gSlider" min="0" max="255" value="130" class="w-full h-2 bg-green-100 rounded-lg appearance-none cursor-pointer accent-green-500">
                    </div>
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1"><span>B</span><span id="bValue">246</span></label>
                        <input type="range" id="bSlider" min="0" max="255" value="246" class="w-full h-2 bg-blue-100 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1"><span>A (Alpha)</span><span id="aValue">1.00</span></label>
                        <input type="range" id="aSlider" min="0" max="100" value="100" class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-gray-500">
                    </div>
                </div>
            </div>

            <!-- Color Values Section -->
            <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
                <h3 class="font-semibold text-gray-900 mb-4" data-i18n="values.title">颜色值</h3>
                
                <div class="space-y-4">
                    <!-- HEX -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <span class="text-xs text-gray-500">HEX</span>
                            <div id="hexValue" class="font-mono text-lg">#3b82f6</div>
                        </div>
                        <button onclick="copyValue('hexValue')" class="copy-btn px-3 py-1 bg-primary text-white rounded text-sm"><i class="fas fa-copy"></i></button>
                    </div>
                    <!-- RGB -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <span class="text-xs text-gray-500">RGB</span>
                            <div id="rgbValue" class="font-mono text-lg">rgb(59, 130, 246)</div>
                        </div>
                        <button onclick="copyValue('rgbValue')" class="copy-btn px-3 py-1 bg-primary text-white rounded text-sm"><i class="fas fa-copy"></i></button>
                    </div>
                    <!-- RGBA -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <span class="text-xs text-gray-500">RGBA</span>
                            <div id="rgbaValue" class="font-mono text-lg">rgba(59, 130, 246, 1)</div>
                        </div>
                        <button onclick="copyValue('rgbaValue')" class="copy-btn px-3 py-1 bg-primary text-white rounded text-sm"><i class="fas fa-copy"></i></button>
                    </div>
                    <!-- HSL -->
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <span class="text-xs text-gray-500">HSL</span>
                            <div id="hslValue" class="font-mono text-lg">hsl(217, 91%, 60%)</div>
                        </div>
                        <button onclick="copyValue('hslValue')" class="copy-btn px-3 py-1 bg-primary text-white rounded text-sm"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Color Palette -->
        <div class="mt-6 bg-white rounded-xl shadow-md border border-gray-100 p-6">
            <h3 class="font-semibold text-gray-900 mb-4" data-i18n="palette.title">配色方案</h3>
            <div id="palette" class="grid grid-cols-5 md:grid-cols-10 gap-2"></div>
        </div>
    </main>

    <script>
        const i18n = {
            zh: {
                'title': '颜色选择器 / Color Picker',
                'subtitle': '选择、转换、生成配色方案',
                'picker.title': '颜色选择',
                'values.title': '颜色值',
                'palette.title': '配色方案',
                'msg.copied': '已复制'
            },
            en: {
                'title': 'Color Picker / 颜色选择器',
                'subtitle': 'Select, convert, and generate color schemes',
                'picker.title': 'Color Selection',
                'values.title': 'Color Values',
                'palette.title': 'Color Scheme',
                'msg.copied': 'Copied'
            }
        };

        let currentLang = 'zh';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-zh').className = lang === 'zh' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.getElementById('lang-en').className = lang === 'en' ? 'px-3 py-1 rounded-md bg-primary text-white text-sm font-medium' : 'px-3 py-1 rounded-md text-gray-600 hover:bg-gray-100 text-sm font-medium';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            localStorage.setItem('devtools-lang', lang);
        }

        const savedLang = localStorage.getItem('devtools-lang');
        if (savedLang) switchLang(savedLang);

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function updateColor() {
            const r = parseInt(document.getElementById('rSlider').value);
            const g = parseInt(document.getElementById('gSlider').value);
            const b = parseInt(document.getElementById('bSlider').value);
            const a = parseInt(document.getElementById('aSlider').value) / 100;

            document.getElementById('rValue').textContent = r;
            document.getElementById('gValue').textContent = g;
            document.getElementById('bValue').textContent = b;
            document.getElementById('aValue').textContent = a.toFixed(2);

            const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
            document.getElementById('colorPicker').value = hex;
            document.getElementById('colorPreview').style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a})`;
            document.getElementById('hexValue').textContent = hex.toUpperCase();
            document.getElementById('rgbValue').textContent = `rgb(${r}, ${g}, ${b})`;
            document.getElementById('rgbaValue').textContent = `rgba(${r}, ${g}, ${b}, ${a})`;
            
            const [h, s, l] = rgbToHsl(r, g, b);
            document.getElementById('hslValue').textContent = `hsl(${h}, ${s}%, ${l}%)`;

            generatePalette(h, s, l);
        }

        function generatePalette(h, s, l) {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const newL = Math.max(10, Math.min(90, l - 40 + i * 10));
                const div = document.createElement('div');
                div.className = 'h-12 rounded-lg cursor-pointer border border-gray-200 hover:scale-105 transition-transform';
                div.style.backgroundColor = `hsl(${h}, ${s}%, ${newL}%)`;
                div.title = `hsl(${h}, ${s}%, ${newL}%)`;
                div.onclick = () => {
                    navigator.clipboard.writeText(`hsl(${h}, ${s}%, ${newL}%)`);
                };
                palette.appendChild(div);
            }
        }

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            const hex = e.target.value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            document.getElementById('rSlider').value = r;
            document.getElementById('gSlider').value = g;
            document.getElementById('bSlider').value = b;
            updateColor();
        });

        ['rSlider', 'gSlider', 'bSlider', 'aSlider'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateColor);
        });

        function copyValue(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert(i18n[currentLang]['msg.copied']);
            });
        }

        updateColor();
    </script>
</body>
</html>
